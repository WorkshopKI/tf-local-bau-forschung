<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeamFlow Local</title>
    <style>
      /* Ladebildschirm — wird sofort angezeigt, vor jeglichem JS */
      #tf-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f5f4f0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      /* Dark Mode: prefers-color-scheme */
      @media (prefers-color-scheme: dark) {
        #tf-loader { background: #2a2a28; color: #cccac4; }
        #tf-loader .tf-loader-sub { color: #8a8880; }
      }
      @media (prefers-color-scheme: light) {
        #tf-loader { background: #f5f4f0; color: #2a2a28; }
        #tf-loader .tf-loader-sub { color: #8a8880; }
      }
      #tf-loader .tf-loader-title {
        font-size: 18px;
        font-weight: 500;
        margin-bottom: 6px;
      }
      #tf-loader .tf-loader-sub {
        font-size: 13px;
      }
      #tf-loader .tf-loader-spinner {
        width: 24px;
        height: 24px;
        border: 2px solid transparent;
        border-top-color: #8a8880;
        border-radius: 50%;
        animation: tf-spin 0.8s linear infinite;
        margin-bottom: 16px;
      }
      @keyframes tf-spin {
        to { transform: rotate(360deg); }
      }
      #tf-loader.tf-loader-hide {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <!-- Ladebildschirm: sichtbar ab dem ersten Byte -->
    <div id="tf-loader">
      <div class="tf-loader-spinner"></div>
      <div class="tf-loader-title">TeamFlow</div>
      <div class="tf-loader-sub" id="tf-loader-status">Anwendung laden...</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Timer: zeigt vergangene Sekunden im Ladebildschirm -->
    <script>
      (function() {
        var start = Date.now();
        var el = document.getElementById('tf-loader-status');
        var timer = setInterval(function() {
          var s = Math.floor((Date.now() - start) / 1000);
          if (el) el.textContent = 'Anwendung laden... ' + s + 's';
        }, 1000);
        // Aufräumen wenn React übernimmt
        window.__tfLoaderCleanup = function() {
          clearInterval(timer);
        };
      })();
    </script>
  </body>
</html>
